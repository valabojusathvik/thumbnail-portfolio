<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Designer Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    background: #1e293b;
}

header h1 {
    margin: 0;
    color: #38bdf8;
}

header p {
    color: #cbd5f5;
}

section {
    padding: 40px;
    text-align: center;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
    color: #38bdf8;
}

.card p {
    margin-bottom: 10px;
    color: #cbd5f5;
}

.contact {
    background: #1e293b;
}

button {
    padding: 12px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}
</style>

</head>

<body>

<header>
    <h1>SATHVIK</h1>
    <p>I design high CTR YouTube thumbnails 🚀</p>
</header>

<section>
    <h2>About Me</h2>
    <p>
        I am a thumbnail designer who creates eye-catching and clickable thumbnails.
        I help YouTubers increase views and engagement 🔥
    </p>
</section>

<section>
    <h2>My Work</h2>

    <div class="gallery">

        <div class="card">
            <img src="images/thumb1.jpeg">
            <h3>Motivation Thumbnail</h3>
        </div>

        <div class="card">
            <img src="images/thumb2.jpeg">
            <h3>Travel Vlog</h3>
        </div>

        <div class="card">
            <img src="images/thumb3.jpeg">
            <h3>Viral Hook</h3>
        </div>

        <div class="card">
            <img src="images/thumb4.jpeg">
            <h3>Food Vlog</h3>
        </div>

        <div class="card">
            <img src="images/thumb5.jpeg">
            <h3>Fitness Transformation</h3>
        </div>

    </div>
</section>

<section class="contact">
    <h2>Contact Me</h2>
    <a href="https://wa.me/918317555560" target="_blank">
        <button>Contact on WhatsApp</button>
    </a>
</section>

</body>
</html>
